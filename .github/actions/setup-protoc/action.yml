name: Setup protoc
description: Install protobuf compiler from official releases

runs:
  using: composite
  steps:
    - name: Install protobuf compiler
      shell: bash
      run: |
        PROTOC_VERSION=$(cat "$GITHUB_WORKSPACE/.protoc-version")
        OS=$(uname -s)
        ARCH=$(uname -m)
        if [ "$OS" = "Linux" ] && [ "$ARCH" = "x86_64" ]; then
          PROTOC_ARCH="linux-x86_64"
        elif [ "$OS" = "Linux" ] && [ "$ARCH" = "aarch64" ]; then
          PROTOC_ARCH="linux-aarch_64"
        elif [ "$OS" = "Darwin" ] && [ "$ARCH" = "x86_64" ]; then
          PROTOC_ARCH="osx-x86_64"
        elif [ "$OS" = "Darwin" ] && [ "$ARCH" = "arm64" ]; then
          PROTOC_ARCH="osx-aarch_64"
        fi
        curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip"
        sudo unzip "protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip" -d /usr/local
        rm "protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip"
