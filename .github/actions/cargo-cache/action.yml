name: Cargo cache
description: Cache the cargo registry, git checkouts, and target/ directory. The registry/git portions are shared across runs naturally (cargo writes them to the same paths under any key); target/ is profile-scoped because debug and release artifacts differ and would otherwise clobber each other.

inputs:
  profile:
    description: "Cargo profile this workflow builds (debug or release). Scopes the target/ cache so debug and release builds keep their own artifacts."
    required: true

runs:
  using: composite
  steps:
    - name: Cache cargo registry, git, and target
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ inputs.profile }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.profile }}-
