name: Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version component to bump (auto = determine from PR labels since last tag)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/bump-version.sh "${{ inputs.bump }}" Cargo.toml

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT }}
          commit-message: "Bumped version to ${{ steps.bump.outputs.new_version }}"
          branch: auto/bump-version
          title: "Bumped version to ${{ steps.bump.outputs.new_version }}"
          body: |
            Bumped version from ${{ steps.bump.outputs.old_version }} to ${{ steps.bump.outputs.new_version }}.

            Please review the changes before merging.
          delete-branch: true
          assignees: larsewi
          labels: chore
