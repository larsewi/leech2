syntax = "proto3";

package cell;

import "google/protobuf/empty.proto";

// Cell represents a single typed value at one (row, column) in a table.
//
// The wire format carries the type via the oneof tag, so the receiver
// knows the type without an additional discriminator field.
message Cell {
  oneof kind {
    google.protobuf.Empty null = 1;
    string text = 2;
    bool boolean = 3;
    double number = 4;
  }
}
