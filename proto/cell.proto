syntax = "proto3";

package cell;

import "google/protobuf/empty.proto";

// Value represents a single typed cell in a table row.
//
// The wire format carries the type via the oneof tag, so the receiver
// knows the type without an additional discriminator field.
message Value {
  oneof kind {
    google.protobuf.Empty null = 1;
    string text = 2;
    bool boolean = 3;
    double number = 4;
  }
}
