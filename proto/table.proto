syntax = "proto3";

package table;

import "record.proto";

// Table represents a collection of records with a defined schema.
// Fields are ordered with primary key columns first, followed by subsidiary columns.
// The number of primary key columns can be inferred from each record's key length.
// The table name is stored as the map key in the parent message.
message Table {
  // The names of all columns in the table, primary key columns first.
  repeated string fields = 1;
  // The records in the table.
  repeated record.Record records = 2;
}
