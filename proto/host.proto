syntax = "proto3";

package host;

// Host identifier embedded in a patch by the agent.
// When present, patch_to_sql injects an extra column into all SQL output.
message Host {
  // Column name in the target database (e.g. "host").
  string name = 1;
  // Controls how the host value is quoted in generated SQL (e.g. "TEXT", "NUMBER").
  // This is not a database column type.
  string field_type = 2;
  // The identifier value (e.g. "agent-1").
  string value = 3;
}
