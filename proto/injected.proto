syntax = "proto3";

package injected;

import "cell.proto";

// A static field injected into all SQL output.
// Each injected field adds a column to INSERT statements and a condition
// to DELETE/UPDATE WHERE clauses.
message Field {
  // Column name in the target database (e.g. "host", "environment").
  string name = 1;
  // The static value. The type is carried by the oneof tag inside the Value.
  cell.Value value = 2;
}
