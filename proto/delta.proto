syntax = "proto3";

package delta;

import "record.proto";
import "update.proto";

// Delta represents the changes to a single table between two states.
// The table name is stored as the map key in the parent message.
message Delta {
  // The primary-key field names, in tuple order.
  repeated string primary_key_names = 1;
  // The subsidiary (non-key) field names, in tuple order.
  repeated string subsidiary_value_names = 2;
  // Records that were added (new keys).
  repeated record.Record inserts = 3;
  // Records that were removed (keys no longer present).
  repeated record.Record deletes = 4;
  // Records that were modified (existing keys with changed values).
  repeated update.Update updates = 5;
}
